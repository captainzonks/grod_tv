name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Runner image ships preinstalled SDK; nothing extra to install.
          packages: ''

      - name: Setup Gradle (with build cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/keystore"
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore/release.keystore"
          # Sanity check — non-empty and PKCS12.
          test -s "$RUNNER_TEMP/keystore/release.keystore"

      - name: Assemble signed release APK
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/keystore/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Verify signature
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          "$BUILD_TOOLS/apksigner" verify --verbose "$APK"
          "$BUILD_TOOLS/apksigner" verify --print-certs "$APK"

      - name: Stage release artifacts
        id: stage
        run: |
          mkdir -p release-artifacts
          RELEASE_NAME=grod_tv-${{ github.ref_name }}.apk
          cp app/build/outputs/apk/release/app-release.apk \
             release-artifacts/"$RELEASE_NAME"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

      - name: Compute SHA-256
        id: sha
        run: |
          cd release-artifacts
          RELEASE_NAME=${{ steps.stage.outputs.release_name }}
          SHA256=$(sha256sum "$RELEASE_NAME" | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          # Sidecar references the final renamed artifact so `sha256sum -c`
          # passes cleanly against the downloaded file.
          echo "$SHA256  $RELEASE_NAME" > "$RELEASE_NAME.sha256"

      - name: Create draft release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## grod_tv ${{ github.ref_name }}

            Android TV companion to [grod](https://github.com/captainzonks/grod).

            **APK SHA-256:** `${{ steps.sha.outputs.sha256 }}`

            ### Install

            Sideload on Android TV 9+ (API 28+):

            ```bash
            adb connect <tv-ip>:5555
            adb install -r grod_tv-${{ github.ref_name }}.apk
            ```

            See [docs/build.md](https://github.com/captainzonks/grod_tv/blob/main/docs/build.md) for from-source builds.
          files: |
            release-artifacts/grod_tv-${{ github.ref_name }}.apk
            release-artifacts/grod_tv-${{ github.ref_name }}.apk.sha256
