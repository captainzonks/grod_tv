name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid overlapping runs on the same ref (e.g. PR + push to PR branch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # The ubuntu-latest runner image ships with platform-tools +
          # all common Android API levels preinstalled under
          # /usr/local/lib/android/sdk; this step just ensures ANDROID_HOME
          # and licenses are configured.
          packages: ''

      - name: Setup Gradle (with build cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Run JVM unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Run Android lint
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-debug-${{ github.sha }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 14

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report-${{ github.sha }}
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 14
